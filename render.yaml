services:
  - type: web
    name: logiq-voice-lab
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/voice-lab run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: PNPM_VERSION
        value: "10"
