[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/voice-lab run build && cd artifacts/voice-lab/netlify/functions && npm install --no-package-lock"
  publish = "artifacts/voice-lab/dist/public"
  functions = "artifacts/voice-lab/netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"
  PNPM_VERSION = "10"

[functions]
  node_bundler = "nft"

[[redirects]]
  from = "/api/tts/voices"
  to = "/.netlify/functions/tts-voices"
  status = 200

[[redirects]]
  from = "/api/tts/generate"
  to = "/.netlify/functions/tts-generate"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
