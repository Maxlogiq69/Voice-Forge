openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LogiQ Voice Lab API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tts
    description: Text-to-speech operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tts/voices:
    get:
      operationId: listVoices
      tags: [tts]
      summary: List available voices
      description: Returns all available Microsoft Edge neural voices
      responses:
        "200":
          description: List of voices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Voice"

  /tts/generate:
    post:
      operationId: generateSpeech
      tags: [tts]
      summary: Generate speech
      description: Converts text to speech using Microsoft Edge neural voices. Returns audio/mpeg stream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeechInput"
      responses:
        "200":
          description: MP3 audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Voice:
      type: object
      required: [id, name, locale, gender, friendlyName]
      properties:
        id:
          type: string
          description: Voice identifier (e.g. en-US-GuyNeural)
        name:
          type: string
          description: Display name
        locale:
          type: string
          description: Locale (e.g. en-US)
        gender:
          type: string
          enum: [Male, Female]
        friendlyName:
          type: string
          description: Human-friendly name

    SpeechInput:
      type: object
      required: [text, voice]
      properties:
        text:
          type: string
          minLength: 1
        voice:
          type: string
          description: Voice ID (e.g. en-US-GuyNeural)
        rate:
          type: string
          description: Speech rate (e.g. "+0%", "-20%", "+20%")
          default: "+0%"
        pitch:
          type: string
          description: Pitch adjustment (e.g. "+0Hz", "-10Hz")
          default: "+0Hz"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
